[colors]
background = #2c2d30
background-alt = #35373b
foreground = #C5C8C6
primary = #55bbee
secondary = #8ABEB7
alert = #A54242
disabled = #707880

cpu = #e16d77
memory = #c99a6e
storage = #e16d77
volume = c27fd7
date_time = 68aee8
battery = #99bc80

[bar/example]
width = 100%
height = 20pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 0px

; separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font Mono:style=Medium,Regular:size=10;2
font-1 = JetBrainsMono Nerd Font Mono:style=Medium,Regular:size=14;2
font-2 = JetBrainsMono Nerd Font Mono:style=Medium,Regular:size=9;2

modules-left = xworkspaces cpu memory battery xwindow
; modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date
modules-right = systray filesystem pulseaudio date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

tray-spacing = 16pt

[module/battery]
type = internal/battery

full-at = 100
low-at = 15

format-charging-prefix = "ůįāĄ"
format-charging-prefix-padding-right = 3px
format-charging-prefix-foreground = ${colors.battery}
format-charging-prefix-font = 1
label-charging-font = 1
label-charging-foreground = ${colors.battery}

format-discharging-prefix = "ůĪäĘ"
format-discharging-prefix-padding-right = 3px
format-discharging-prefix-foreground = ${colors.battery}
format-discharging-prefix-font = 1
label-discharging-font = 1
label-discharging-foreground = ${colors.battery}

format-low-prefix = "ůĪä°"
format-low-prefix-padding-right = 3px
format-low-prefix-foreground = ${colors.alert}
format-low-prefix-font = 1
label-low-font = 1
label-low-foreground = ${colors.alert}

format-full-prefix = "ůĪä£"
format-full-prefix-padding-right = 3px
format-full-prefix-foreground = ${colors.battery}
format-full-prefix-font = 1
label-full-font = 1
label-full-foreground = ${colors.battery}

; battery = BAT0
; adapter = ADP1

poll-interval = 5

[module/xworkspaces]
format-margin = 0px
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= #e16d77
label-active-foreground = #e16d77
label-active-padding = 8px

label-occupied = %name%
label-occupied-foreground = #97ca72
label-occupied-padding = 8px

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 8px

label-empty = %name%
label-empty-foreground = #97ca72
label-empty-padding = 8px

[module/xwindow]
label-margin-left = 12px

type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
format-mounted-prefix-margin-left = 5pt

type = internal/fs
interval = 25

mount-0 = /

format-mounted-prefix = "ůĪõü"
format-mounted-prefix-font = 2
format-mounted-prefix-padding-right = 7px
format-mounted-prefix-foreground = ${colors.storage}
; label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-mounted = %percentage_used%%
label-mounted-foreground = ${colors.storage}

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
format-volume-prefix-margin-left = 6pt
label-muted-margin-left = 6pt

type = internal/pulseaudio

format-volume-prefix = "Óėł"
format-volume-prefix-padding-right = 7px
format-volume-prefix-font = 2
format-volume-prefix-foreground = ${colors.volume}
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.volume}

label-muted = muted
label-muted-foreground = ${colors.disabled}

; [module/xkeyboard]
; type = internal/xkeyboard
; blacklist-0 = num lock
;
; label-layout = %layout%
; label-layout-foreground = ${colors.primary}
;
; label-indicator-padding = 2
; label-indicator-margin = 1
; label-indicator-foreground = ${colors.background}
; label-indicator-background = ${colors.secondary}

[module/memory]
format-prefix-margin-left = 5px
label-margin-right = 7px

type = internal/memory
interval = 2
format-prefix = "ÓŅÖ"
format-prefix-padding-right = 5px
format-prefix-font = 2
format-prefix-foreground = ${colors.memory}
; label = %percentage_used:2%%
label = %percentage_used%%
label-foreground = ${colors.memory}
label-font = 3

[module/cpu]
format-prefix-margin-left = 5px
label-margin-right = 2px

type = internal/cpu
interval = 2
format-prefix = "ÓČ¶"
format-prefix-font = 2
format-prefix-padding-right = 5px
format-prefix-foreground = ${colors.cpu}
; label = %percentage:2%%
label = %percentage%%
label-foreground = ${colors.cpu}
label-font = 3

; [network-base]
; type = internal/network
; interval = 5
; format-connected = <label-connected>
; format-disconnected = <label-disconnected>
; label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected
;
; [module/wlan]
; inherit = network-base
; interface-type = wireless
; label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
;
; [module/eth]
; inherit = network-base
; interface-type = wired
; label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
label-margin-left = 5pt

type = internal/date
interval = 1

date = %H:%M
date-alt = %d %B %Y %H:%M:%S

label = %date%
label-foreground = ${colors.date_time}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
